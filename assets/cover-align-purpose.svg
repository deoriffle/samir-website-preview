  <g stroke="#3A4374" stroke-width="10" stroke-linecap="round" fill="none" opacity=".5">
    <path d="M150 190 C 200 170, 240 210, 290 186"/><path d="M268 170 L 292 185 L 264 202"/>
    <path d="M130 360 C 180 400, 230 350, 280 384"/><path d="M262 402 L 282 383 L 252 370"/>
    <path d="M170 540 C 210 500, 260 560, 310 522"/><path d="M292 508 L 312 521 L 288 544"/>
